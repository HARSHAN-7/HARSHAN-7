<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgBase" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#171233"/>
      <stop offset="55%" stop-color="#0B0A1E"/>
      <stop offset="100%" stop-color="#040309"/>
    </radialGradient>

    <linearGradient id="auroraA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7F5CFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7F5CFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7F5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="auroraB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#22D3B0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3B0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22D3B0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="auroraC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FFB347" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB347" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0" gradientTransform="translate(-1,0)">
      <stop offset="0%"  stop-color="#7F5CFF"/>
      <stop offset="30%" stop-color="#22D3B0"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#7F5CFF"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1.8 0; -1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="blurLg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="430" fill="url(#bgBase)"/>

  <!-- aurora bands -->
  <g filter="url(#blurLg)">
    <rect x="-200" y="10"  width="1400" height="70" fill="url(#auroraA)">
      <animateTransform attributeName="transform" type="translate" values="-60 0;60 0;-60 0" dur="14s" repeatCount="indefinite"/>
    </rect>
    <rect x="-200" y="350" width="1400" height="70" fill="url(#auroraB)">
      <animateTransform attributeName="transform" type="translate" values="80 0;-80 0;80 0" dur="18s" repeatCount="indefinite"/>
    </rect>
    <rect x="-200" y="120" width="1400" height="50" fill="url(#auroraC)">
      <animateTransform attributeName="transform" type="translate" values="-50 0;50 0;-50 0" dur="16s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- twinkling stars -->
  <g fill="#ffffff">
    <circle cx="60"  cy="30"  r="1.3"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="945" cy="45"  r="1.3"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="40"  cy="400" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="390" r="1.2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- triangle unity line between the three pillars -->
  <g stroke="#3A3560" stroke-width="1" opacity="0.6" fill="none">
    <path d="M180,235 L500,235 L820,235 Z"/>
  </g>

  <!-- connectors: identity -> each pillar, animated data flow -->
  <g stroke="#4A4570" stroke-width="1.4" fill="none" opacity="0.8">
    <path id="c1" d="M500,110 C 420,150 260,190 180,225"/>
    <path id="c2" d="M500,110 L 500,225"/>
    <path id="c3" d="M500,110 C 580,150 740,190 820,225"/>
  </g>
  <g stroke-width="2" fill="none" stroke-linecap="round">
    <use href="#c1" stroke="#7F5CFF"><animate attributeName="stroke-dasharray" values="0,400;55,400" dur="1.7s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.7s" repeatCount="indefinite"/></use>
    <use href="#c2" stroke="#22D3B0"><animate attributeName="stroke-dasharray" values="0,400;55,400" dur="1.5s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.5s" repeatCount="indefinite"/></use>
    <use href="#c3" stroke="#FFB347"><animate attributeName="stroke-dasharray" values="0,400;55,400" dur="1.9s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.9s" repeatCount="indefinite"/></use>
  </g>

  <!-- ============ AI PILLAR (violet) ============ -->
  <g transform="translate(180,260)">
    <circle r="30" fill="none" stroke="#7F5CFF" stroke-width="1.3" opacity="0.6">
      <animate attributeName="r" values="30;58;30" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="#7F5CFF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="none" stroke="#EAE3FF" stroke-width="1" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#0B0A1E">AI</text>
  </g>
  <text x="180" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#B79CFF">AGENTIC AI</text>

  <!-- AI skill tags -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#EAE3FF">
    <line x1="150" y1="290" x2="90"  y2="330" stroke="#7F5CFF" stroke-width="1" opacity="0.5"/>
    <rect x="55"  y="330" width="70" height="24" rx="12" fill="#241B4D" stroke="#7F5CFF" stroke-width="1"/>
    <text x="90" y="346" text-anchor="middle">n8n</text>

    <line x1="180" y1="310" x2="180" y2="345" stroke="#7F5CFF" stroke-width="1" opacity="0.5"/>
    <rect x="130" y="345" width="100" height="24" rx="12" fill="#241B4D" stroke="#7F5CFF" stroke-width="1"/>
    <text x="180" y="361" text-anchor="middle">OpenAI API</text>

    <line x1="210" y1="290" x2="265" y2="330" stroke="#7F5CFF" stroke-width="1" opacity="0.5"/>
    <rect x="240" y="330" width="90" height="24" rx="12" fill="#241B4D" stroke="#7F5CFF" stroke-width="1"/>
    <text x="285" y="346" text-anchor="middle">Python</text>
  </g>

  <!-- ============ DATA PILLAR (teal) ============ -->
  <g transform="translate(500,260)">
    <circle r="30" fill="none" stroke="#22D3B0" stroke-width="1.3" opacity="0.6">
      <animate attributeName="r" values="30;58;30" begin="1s" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" begin="1s" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="#22D3B0" filter="url(#glow)">
      <animate attributeName="opacity" values="0.85;1;0.85" begin="0.5s" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="none" stroke="#E3FFF8" stroke-width="1" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#0B0A1E">DATA</text>
  </g>
  <text x="500" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#7FF0DA">DATA ANALYST</text>

  <!-- Data skill tags -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#E3FFF8">
    <line x1="470" y1="290" x2="420" y2="330" stroke="#22D3B0" stroke-width="1" opacity="0.5"/>
    <rect x="385" y="330" width="70" height="24" rx="12" fill="#0F3A34" stroke="#22D3B0" stroke-width="1"/>
    <text x="420" y="346" text-anchor="middle">SQL</text>

    <line x1="500" y1="310" x2="500" y2="345" stroke="#22D3B0" stroke-width="1" opacity="0.5"/>
    <rect x="445" y="345" width="110" height="24" rx="12" fill="#0F3A34" stroke="#22D3B0" stroke-width="1"/>
    <text x="500" y="361" text-anchor="middle">Power BI</text>

    <line x1="530" y1="290" x2="585" y2="330" stroke="#22D3B0" stroke-width="1" opacity="0.5"/>
    <rect x="555" y="330" width="90" height="24" rx="12" fill="#0F3A34" stroke="#22D3B0" stroke-width="1"/>
    <text x="600" y="346" text-anchor="middle">Pandas</text>
  </g>

  <!-- ============ WEB PILLAR (amber) ============ -->
  <g transform="translate(820,260)">
    <circle r="30" fill="none" stroke="#FFB347" stroke-width="1.3" opacity="0.6">
      <animate attributeName="r" values="30;58;30" begin="2s" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" begin="2s" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="#FFB347" filter="url(#glow)">
      <animate attributeName="opacity" values="0.85;1;0.85" begin="1s" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="43.4,-25 43.4,25 0,50 -43.4,25 -43.4,-25 0,-50" fill="none" stroke="#FFF3E0" stroke-width="1" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#0B0A1E">WEB</text>
  </g>
  <text x="820" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#FFCB8A">WEB DEV</text>

  <!-- Web skill tags -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#FFF3E0">
    <line x1="790" y1="290" x2="740" y2="330" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <rect x="700" y="330" width="80" height="24" rx="12" fill="#4A2E0D" stroke="#FFB347" stroke-width="1"/>
    <text x="740" y="346" text-anchor="middle">JS / HTML</text>

    <line x1="820" y1="310" x2="820" y2="345" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <rect x="765" y="345" width="110" height="24" rx="12" fill="#4A2E0D" stroke="#FFB347" stroke-width="1"/>
    <text x="820" y="361" text-anchor="middle">MySQL</text>

    <line x1="850" y1="290" x2="905" y2="330" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <rect x="875" y="330" width="80" height="24" rx="12" fill="#4A2E0D" stroke="#FFB347" stroke-width="1"/>
    <text x="915" y="346" text-anchor="middle">Figma</text>
  </g>

  <!-- ============ IDENTITY BADGE ============ -->
  <rect x="335" y="55" width="330" height="55" rx="27" fill="#12102A" stroke="#4A4570" stroke-width="1"/>
  <text x="500" y="90" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="url(#shimmer)">
    Harshan Rasu
  </text>
</svg>
