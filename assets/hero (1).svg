<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#132540"/>
      <stop offset="60%" stop-color="#0A1220"/>
      <stop offset="100%" stop-color="#05080F"/>
    </radialGradient>

    <linearGradient id="coreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8FF7FF"/>
      <stop offset="55%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#0072B8"/>
    </linearGradient>

    <linearGradient id="nodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5FE3FF"/>
      <stop offset="100%" stop-color="#0088C4"/>
    </linearGradient>

    <linearGradient id="textShimmer" x1="0" y1="0" x2="1" y2="0" gradientTransform="translate(-1,0)">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00C9FF"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1.6 0; -1 0" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1000" height="360" fill="url(#bgGlow)"/>

  <!-- perspective grid (vanishing toward the core) -->
  <g stroke="#173251" stroke-width="1" opacity="0.55">
    <line x1="60"  y1="360" x2="330" y2="70"/>
    <line x1="220" y1="360" x2="380" y2="70"/>
    <line x1="500" y1="360" x2="470" y2="70"/>
    <line x1="780" y1="360" x2="560" y2="70"/>
    <line x1="940" y1="360" x2="610" y2="70"/>
    <line x1="20"  y1="330" x2="980" y2="330"/>
    <line x1="90"  y1="290" x2="910" y2="290"/>
    <line x1="160" y1="250" x2="840" y2="250"/>
  </g>

  <!-- twinkling stardust -->
  <g fill="#7fe3ff">
    <circle cx="80"  cy="50"  r="1.6"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="40"  r="1.6"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="180" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2"   dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="200" r="1.4"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="30"  r="1.2"><animate attributeName="opacity" values="0.3;1;0.3"   dur="1.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== network core (center) ===== -->
  <g transform="translate(500,168)">

    <!-- radar pulses -->
    <circle r="40" fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="40;95;40" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="40;95;40" begin="1.2s" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" begin="1.2s" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="40;95;40" begin="2.4s" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" begin="2.4s" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- orbit ring with traveling dot -->
    <circle r="66" fill="none" stroke="#2A5E86" stroke-width="1" stroke-dasharray="3 6" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#EAFBFF" filter="url(#glowSoft)">
      <animateMotion dur="7s" repeatCount="indefinite" path="M 66,0 A 66,66 0 1 1 65.99,0"/>
    </circle>

    <!-- core hexagon, slow breathing rotation -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0;6;0;-6;0" dur="6s" repeatCount="indefinite"/>
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36" fill="url(#coreFill)">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2.4s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36" fill="none" stroke="#EAFBFF" stroke-width="1.2" opacity="0.7"/>
    </g>
  </g>

  <!-- ===== peripheral nodes + data-flow connections ===== -->
  <g stroke="#2A5E86" stroke-width="1.4" fill="none" opacity="0.9">
    <path id="p1" d="M500,168 C 380,120 300,90 190,95"/>
    <path id="p2" d="M500,168 C 380,210 300,255 190,255"/>
    <path id="p3" d="M500,168 C 620,120 700,90 810,95"/>
    <path id="p4" d="M500,168 C 620,210 700,255 810,255"/>
  </g>
  <g stroke="#00C9FF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9">
    <use href="#p1"><animate attributeName="stroke-dasharray" values="0,400;60,400" dur="1.6s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.6s" repeatCount="indefinite"/></use>
    <use href="#p2"><animate attributeName="stroke-dasharray" values="0,400;60,400" dur="1.8s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.8s" repeatCount="indefinite"/></use>
    <use href="#p3"><animate attributeName="stroke-dasharray" values="0,400;60,400" dur="1.5s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.5s" repeatCount="indefinite"/></use>
    <use href="#p4"><animate attributeName="stroke-dasharray" values="0,400;60,400" dur="1.9s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-400" dur="1.9s" repeatCount="indefinite"/></use>
  </g>

  <!-- peripheral hex nodes -->
  <g fill="url(#nodeFill)" stroke="#EAFBFF" stroke-width="1" filter="url(#glowSoft)">
    <g transform="translate(190,95) scale(0.55)">
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <g transform="translate(190,255) scale(0.55)">
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36">
        <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <g transform="translate(810,95) scale(0.55)">
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36">
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.1s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <g transform="translate(810,255) scale(0.55)">
      <polygon points="31.3,-18 31.3,18 0,36 -31.3,18 -31.3,-18 0,-36">
        <animate attributeName="opacity" values="1;0.85;1" dur="2.4s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- name: shimmer gradient text -->
  <text x="500" y="330" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700" fill="url(#textShimmer)">
    HARSHAN RASU
  </text>
</svg>
