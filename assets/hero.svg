<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="55%" stop-color="#0F2027"/>
      <stop offset="100%" stop-color="#122036"/>
    </linearGradient>

    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CF9FF"/>
      <stop offset="100%" stop-color="#00C9FF"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#0072A3"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00516E"/>
      <stop offset="100%" stop-color="#012E40"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- subtle grid pattern for depth -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c2a3a" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  <rect width="900" height="320" fill="url(#grid)" opacity="0.5"/>

  <!-- ambient glow behind cube -->
  <circle cx="150" cy="160" r="140" fill="url(#glow)">
    <animate attributeName="r" values="120;150;120" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- floating isometric cube (built from 3 parallelogram faces) -->
  <g transform="translate(150,150)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 -14; 0 0" dur="3.2s" repeatCount="indefinite"/>

      <!-- top face -->
      <polygon points="0,-55 48,-28 0,-1 -48,-28" fill="url(#topFace)" filter="url(#softGlow)">
        <animate attributeName="opacity" values="1;0.75;1" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <!-- left face -->
      <polygon points="-48,-28 0,-1 0,55 -48,28" fill="url(#leftFace)">
        <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      </polygon>
      <!-- right face -->
      <polygon points="48,-28 0,-1 0,55 48,28" fill="url(#rightFace)">
        <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      </polygon>

      <!-- slow full-cube spin for extra dimensionality -->
      <animateTransform attributeName="transform" type="rotate"
        values="0;8;0;-8;0" dur="6s" additive="sum" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- orbiting particles around the cube -->
  <g fill="#00C9FF">
    <circle r="3">
      <animateMotion dur="5s" repeatCount="indefinite"
        path="M 150,60 A 100,100 0 1 1 149,60" />
    </circle>
    <circle r="2.4" opacity="0.8">
      <animateMotion dur="7s" repeatCount="indefinite"
        path="M 150,260 A 110,110 0 1 0 149,260" />
    </circle>
    <circle r="2" opacity="0.6">
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M 60,150 A 90,90 0 1 1 61,150" />
    </circle>
  </g>

  <!-- name + tagline -->
  <text x="330" y="140" font-family="JetBrains Mono, monospace" font-size="46" font-weight="700" fill="#EAF6FF" filter="url(#softGlow)">
    HARSHAN RASU
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="330" y="175" font-family="JetBrains Mono, monospace" font-size="18" fill="#00C9FF">
    Agentic AI Developer · Data Analyst · Web Developer
  </text>

  <!-- animated underline -->
  <rect x="330" y="192" height="3" fill="#00C9FF" rx="1.5">
    <animate attributeName="width" values="0;430;430;0" keyTimes="0;0.4;0.8;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- terminal-style status line -->
  <text x="330" y="230" font-family="JetBrains Mono, monospace" font-size="15" fill="#7FDBFF" opacity="0.85">
    <tspan>&gt; status: building autonomous systems_</tspan>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.6s" repeatCount="indefinite"/>
  </text>
</svg>
